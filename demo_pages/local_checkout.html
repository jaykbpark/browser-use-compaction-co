<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BrowserDelta Local Checkout</title>
    <style>
      :root {
        color: #172026;
        background: #f4f6f8;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        grid-template-columns: minmax(360px, 520px) minmax(360px, 1fr);
        min-height: 100vh;
      }

      .checkout {
        border-right: 1px solid #d6dde3;
        background: #ffffff;
        padding: 48px;
      }

      .insights {
        padding: 48px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        color: #50606d;
        line-height: 1.5;
      }

      label {
        display: grid;
        gap: 8px;
        margin-top: 24px;
        color: #2d3b45;
        font-weight: 650;
      }

      input {
        width: 100%;
        border: 1px solid #bac5ce;
        border-radius: 6px;
        padding: 12px 13px;
        font: inherit;
      }

      button,
      .buttonlike {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 6px;
        background: #1565c0;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 44px;
        padding: 0 16px;
      }

      button.secondary,
      .buttonlike.secondary {
        background: #1f2933;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 22px;
      }

      .error {
        min-height: 24px;
        margin: 12px 0 0;
        color: #b42318;
        font-weight: 700;
      }

      .chart-shell {
        width: min(100%, 560px);
        border: 1px solid #d6dde3;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 4px;
      }

      .dialog-backdrop[hidden] {
        display: none;
      }

      .dialog-backdrop {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgb(16 24 40 / 40%);
      }

      [role="dialog"] {
        width: min(520px, calc(100vw - 32px));
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 24px 80px rgb(16 24 40 / 30%);
      }

      [role="dialog"] h2 {
        margin: 0;
      }

      @media (max-width: 860px) {
        main {
          grid-template-columns: 1fr;
        }

        .checkout {
          border-right: 0;
          border-bottom: 1px solid #d6dde3;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="checkout">
        <h1>Checkout</h1>
        <p>Use this page to verify BrowserDelta records real browser state transitions.</p>

        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          data-testid="checkout-email"
          autocomplete="off"
          placeholder="you@example.com"
        />

        <p id="email-error" class="error" aria-live="polite"></p>

        <div class="actions">
          <button id="continue" data-testid="continue-checkout">Continue</button>
          <div
            id="refresh-chart"
            role="button"
            aria-label="Refresh chart"
            tabindex="-1"
            class="buttonlike secondary"
            data-testid="refresh-chart"
          >
            Refresh chart
          </div>
        </div>
      </section>

      <section class="insights">
        <div class="chart-shell">
          <h2>Inventory pulse</h2>
          <p>Canvas updates should trigger visual crop fallback without DOM text changes.</p>
          <canvas id="chart" width="560" height="260" aria-label="Inventory chart"></canvas>
        </div>
      </section>
    </main>

    <div id="dialog-backdrop" class="dialog-backdrop" hidden>
      <section role="dialog" aria-modal="true" aria-labelledby="dialog-title">
        <h2 id="dialog-title">Confirm order</h2>
        <p>Shipping details are ready. Confirm to finish the checkout.</p>
        <label for="address">Address</label>
        <input id="address" name="address" data-testid="shipping-address" value="221 Delta Ave" />
        <label for="delivery">Delivery window</label>
        <select id="delivery" name="delivery" data-testid="delivery-window">
          <option>Today 5 PM</option>
          <option>Tomorrow 9 AM</option>
        </select>
        <div class="actions">
          <button id="confirm" data-testid="confirm-order">Confirm order</button>
        </div>
      </section>
    </div>

    <script>
      const email = document.getElementById("email");
      const emailError = document.getElementById("email-error");
      const dialog = document.getElementById("dialog-backdrop");
      const chart = document.getElementById("chart");
      const ctx = chart.getContext("2d");
      let chartVersion = 0;

      function drawChart() {
        const palettes = [
          ["#1565c0", "#2e7d32", "#f9ab00", "#7b1fa2"],
          ["#c62828", "#00838f", "#5d4037", "#455a64"],
        ];
        const values = [
          [120, 180, 88, 142],
          [190, 92, 160, 74],
        ];
        const palette = palettes[chartVersion % palettes.length];
        const set = values[chartVersion % values.length];

        ctx.fillStyle = chartVersion % 2 === 0 ? "#ffffff" : "#eef7ff";
        ctx.fillRect(0, 0, chart.width, chart.height);
        ctx.fillStyle = chartVersion % 2 === 0 ? "#eef2f7" : "#dbeafe";
        ctx.fillRect(36, 28, 490, 204);
        ctx.strokeStyle = "#cfd8dc";
        ctx.lineWidth = 1;
        for (let y = 40; y <= 220; y += 45) {
          ctx.beginPath();
          ctx.moveTo(36, y);
          ctx.lineTo(526, y);
          ctx.stroke();
        }

        set.forEach((value, index) => {
          const x = 78 + index * 112;
          const y = 226 - value;
          ctx.fillStyle = palette[index];
          ctx.fillRect(x, y, 58, value);
        });
      }

      document.getElementById("continue").addEventListener("click", () => {
        if (!email.value.trim()) {
          emailError.textContent = "Email is required";
          email.focus();
          return;
        }
        emailError.textContent = "";
        dialog.hidden = false;
      });

      document.getElementById("refresh-chart").addEventListener("click", () => {
        chartVersion += 1;
        drawChart();
        email.focus({ preventScroll: true });
      });

      document.getElementById("confirm").addEventListener("click", () => {
        dialog.hidden = true;
        emailError.textContent = "Order submitted successfully";
      });

      drawChart();
    </script>
  </body>
</html>
