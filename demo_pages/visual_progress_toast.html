<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BrowserDelta Visual Progress Toast</title>
    <style>
      :root {
        color: #18212f;
        background: #f5f7fa;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        padding: 46px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: #5f6b76;
        line-height: 1.45;
      }

      .panel {
        width: 820px;
        max-width: calc(100vw - 92px);
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
      }

      .progress-shell {
        width: 100%;
        height: 78px;
        border: 1px solid #bfccd8;
        border-radius: 8px;
        background: #edf2f7;
        overflow: hidden;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #0b6bcb, #00a3a3);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      [role="button"] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border-radius: 6px;
        background: #1f6feb;
        color: #ffffff;
        cursor: pointer;
        font-weight: 700;
        padding: 0 16px;
        user-select: none;
      }

      [role="button"].secondary {
        background: #334155;
      }

      [role="status"] {
        width: max-content;
        margin-top: 18px;
        border: 1px solid #9bd5b0;
        border-radius: 8px;
        background: #ecfdf3;
        color: #05603a;
        font-weight: 700;
        padding: 14px 16px;
      }

      [hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Upload Monitor</h1>
      <p>The progress bar changes visually before a completion toast appears.</p>

      <section class="panel" aria-label="Progress benchmark">
        <div class="progress-shell" role="progressbar" aria-label="Upload progress">
          <div id="progress-fill" class="progress-fill"></div>
        </div>

        <div class="actions">
          <div
            id="start-upload"
            role="button"
            aria-label="Start upload"
            tabindex="-1"
            data-testid="start-upload"
          >
            Start upload
          </div>
          <div
            id="advance-upload"
            role="button"
            aria-label="Advance upload"
            tabindex="-1"
            class="secondary"
            data-testid="advance-upload"
          >
            Advance upload
          </div>
          <div
            id="finish-upload"
            role="button"
            aria-label="Finish upload"
            tabindex="-1"
            class="secondary"
            data-testid="finish-upload"
          >
            Finish upload
          </div>
        </div>

        <div id="toast" role="status" aria-live="polite" hidden>Upload complete</div>
      </section>
    </main>

    <script>
      const fill = document.getElementById("progress-fill");
      const toast = document.getElementById("toast");

      function setProgress(percent) {
        fill.style.width = `${percent}%`;
      }

      function clearFocus() {
        if (document.activeElement instanceof HTMLElement) {
          document.activeElement.blur();
        }
      }

      document.getElementById("start-upload").addEventListener("click", () => {
        toast.hidden = true;
        setProgress(36);
        clearFocus();
      });

      document.getElementById("advance-upload").addEventListener("click", () => {
        toast.hidden = true;
        setProgress(72);
        clearFocus();
      });

      document.getElementById("finish-upload").addEventListener("click", () => {
        setProgress(100);
        toast.hidden = false;
        clearFocus();
      });
    </script>
  </body>
</html>
