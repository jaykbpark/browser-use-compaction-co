<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BrowserDelta Visual Swatch Picker</title>
    <style>
      :root {
        color: #172026;
        background: #f6f7f9;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        padding: 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: #5b6671;
        line-height: 1.45;
      }

      fieldset {
        width: 780px;
        max-width: calc(100vw - 96px);
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: #ffffff;
        margin: 0;
        padding: 22px;
      }

      legend {
        padding: 0 6px;
        font-weight: 800;
      }

      .swatches {
        display: grid;
        grid-template-columns: repeat(4, minmax(130px, 1fr));
        gap: 14px;
      }

      .choice {
        display: grid;
        grid-template-columns: 22px 1fr;
        align-items: center;
        gap: 10px;
      }

      input[type="radio"] {
        width: 18px;
        height: 18px;
        margin: 0;
      }

      .swatch-card {
        display: grid;
        grid-template-columns: 44px 1fr;
        align-items: center;
        gap: 10px;
        min-height: 72px;
        border: 2px solid #d0d7de;
        border-radius: 8px;
        padding: 12px;
        font-weight: 800;
      }

      input[type="radio"]:checked + .swatch-card {
        border-color: #111827;
        box-shadow: inset 0 0 0 3px #ffffff, 0 0 0 4px #1f6feb;
      }

      .chip {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 1px solid rgb(0 0 0 / 18%);
      }

      .coral {
        background: #ef6f6c;
      }

      .mint {
        background: #2fbf71;
      }

      .ocean {
        background: #1f7a8c;
      }

      .graphite {
        background: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Swatch Picker</h1>
      <p>Radio state and selected-border styling change without adding page text.</p>

      <fieldset>
        <legend>Finish color</legend>
        <div class="swatches">
          <label class="choice" for="color-coral">
            <input id="color-coral" type="radio" name="finish-color" value="coral" />
            <span class="swatch-card">
              <span class="chip coral"></span>
              Coral
            </span>
          </label>
          <label class="choice" for="color-mint">
            <input id="color-mint" type="radio" name="finish-color" value="mint" />
            <span class="swatch-card">
              <span class="chip mint"></span>
              Mint
            </span>
          </label>
          <label class="choice" for="color-ocean">
            <input id="color-ocean" type="radio" name="finish-color" value="ocean" />
            <span class="swatch-card">
              <span class="chip ocean"></span>
              Ocean
            </span>
          </label>
          <label class="choice" for="color-graphite">
            <input
              id="color-graphite"
              type="radio"
              name="finish-color"
              value="graphite"
              checked
            />
            <span class="swatch-card">
              <span class="chip graphite"></span>
              Graphite
            </span>
          </label>
        </div>
      </fieldset>
    </main>
  </body>
</html>
