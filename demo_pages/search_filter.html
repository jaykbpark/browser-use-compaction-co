<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fruit Finder</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #f5f6f8;
      color: #1c2330;
    }
    header {
      background: #16324f;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; margin: 0; }
    #cart { font-weight: 600; }
    main { max-width: 760px; margin: 24px auto; padding: 0 24px; }
    .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    #search {
      flex: 1;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #c2c9d6;
      border-radius: 6px;
    }
    #reset {
      padding: 10px 16px;
      font-size: 14px;
      border: 1px solid #16324f;
      background: #fff;
      color: #16324f;
      border-radius: 6px;
      cursor: pointer;
    }
    #count { color: #5a6678; font-size: 13px; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #eef1f5; }
    th { background: #eef1f5; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: #5a6678; }
    tr.hidden { display: none; }
    .add-btn {
      padding: 6px 12px;
      font-size: 13px;
      border: 1px solid #2f7d4f;
      background: #2f7d4f;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
    .add-btn:disabled { background: #c9d6cd; border-color: #c9d6cd; color: #6b7a70; cursor: default; }
    #empty { display: none; color: #98506a; padding: 16px; background: #fff; border-radius: 8px; margin-top: 8px; }
    #empty.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>Fruit Finder</h1>
    <span id="cart">Cart: 0</span>
  </header>
  <main>
    <div class="controls">
      <input id="search" type="text" placeholder="Search fruits" aria-label="Search fruits" autocomplete="off" />
      <button id="reset" type="button">Reset</button>
    </div>
    <div id="count">Showing 12 of 12</div>
    <table>
      <thead>
        <tr><th>Fruit</th><th>Price</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty">No fruits match your search.</div>
  </main>

  <script>
    // Fixed, deterministic dataset (no randomness, no time-based behavior).
    var FRUITS = [
      { name: "Apple", price: "$1.20" },
      { name: "Apricot", price: "$2.10" },
      { name: "Banana", price: "$0.80" },
      { name: "Blackberry", price: "$3.40" },
      { name: "Blueberry", price: "$3.10" },
      { name: "Cherry", price: "$4.50" },
      { name: "Grape", price: "$2.70" },
      { name: "Mango", price: "$1.90" },
      { name: "Orange", price: "$1.10" },
      { name: "Raspberry", price: "$3.80" },
      { name: "Strawberry", price: "$2.90" },
      { name: "Watermelon", price: "$5.20" }
    ];

    var cartCount = 0;
    var rowsEl = document.getElementById("rows");
    var countEl = document.getElementById("count");
    var emptyEl = document.getElementById("empty");
    var cartEl = document.getElementById("cart");
    var searchEl = document.getElementById("search");

    function render() {
      rowsEl.innerHTML = "";
      FRUITS.forEach(function (fruit) {
        var tr = document.createElement("tr");
        tr.dataset.name = fruit.name.toLowerCase();

        var nameTd = document.createElement("td");
        nameTd.textContent = fruit.name;

        var priceTd = document.createElement("td");
        priceTd.textContent = fruit.price;

        var actionTd = document.createElement("td");
        var btn = document.createElement("button");
        btn.className = "add-btn";
        btn.type = "button";
        btn.textContent = "Add " + fruit.name;
        btn.addEventListener("click", function () {
          cartCount += 1;
          cartEl.textContent = "Cart: " + cartCount;
          btn.disabled = true;
          btn.textContent = "Added " + fruit.name;
        });
        actionTd.appendChild(btn);

        tr.appendChild(nameTd);
        tr.appendChild(priceTd);
        tr.appendChild(actionTd);
        rowsEl.appendChild(tr);
      });
    }

    function applyFilter() {
      var query = searchEl.value.trim().toLowerCase();
      var shown = 0;
      Array.prototype.forEach.call(rowsEl.children, function (tr) {
        var match = tr.dataset.name.indexOf(query) !== -1;
        tr.classList.toggle("hidden", !match);
        if (match) shown += 1;
      });
      countEl.textContent = "Showing " + shown + " of " + FRUITS.length;
      emptyEl.classList.toggle("visible", shown === 0);
    }

    searchEl.addEventListener("input", applyFilter);
    document.getElementById("reset").addEventListener("click", function () {
      searchEl.value = "";
      applyFilter();
    });

    render();
    applyFilter();
  </script>
</body>
</html>
