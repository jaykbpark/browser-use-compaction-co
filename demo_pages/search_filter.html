<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fruit Finder</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f6f8;
      color: #1c2330;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      align-items: center;
      background: #16324f;
      color: #fff;
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
    }
    h1 { font-size: 18px; margin: 0; }
    main { margin: 24px auto; max-width: 760px; padding: 0 24px; }
    .controls {
      align-items: center;
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    #search {
      border: 1px solid #c2c9d6;
      border-radius: 6px;
      flex: 1;
      font-size: 15px;
      padding: 10px 12px;
    }
    #reset {
      background: #fff;
      border: 1px solid #16324f;
      border-radius: 6px;
      color: #16324f;
      cursor: pointer;
      font-size: 14px;
      padding: 10px 16px;
    }
    #count {
      color: #5a6678;
      font-size: 13px;
      margin-bottom: 12px;
    }
    table {
      background: #fff;
      border-collapse: collapse;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
    }
    th, td {
      border-bottom: 1px solid #eef1f5;
      padding: 12px 16px;
      text-align: left;
    }
    th {
      background: #eef1f5;
      color: #5a6678;
      font-size: 13px;
      text-transform: uppercase;
    }
    tr.hidden { display: none; }
    .add-btn {
      background: #2f7d4f;
      border: 1px solid #2f7d4f;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      padding: 6px 12px;
    }
    .add-btn:disabled {
      background: #c9d6cd;
      border-color: #c9d6cd;
      color: #6b7a70;
      cursor: default;
    }
    #empty {
      background: #fff;
      border-radius: 8px;
      color: #98506a;
      display: none;
      margin-top: 8px;
      padding: 16px;
    }
    #empty.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>Fruit Finder</h1>
    <span id="cart">Cart: 0</span>
  </header>
  <main>
    <div class="controls">
      <input id="search" type="text" placeholder="Search fruits" aria-label="Search fruits" autocomplete="off" />
      <button id="reset" type="button">Reset</button>
    </div>
    <div id="count">Showing 12 of 12</div>
    <table>
      <thead>
        <tr><th>Fruit</th><th>Price</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty">No fruits match your search.</div>
  </main>

  <script>
    var FRUITS = [
      { name: "Apple", price: "$1.20" },
      { name: "Apricot", price: "$2.10" },
      { name: "Banana", price: "$0.80" },
      { name: "Blackberry", price: "$3.40" },
      { name: "Blueberry", price: "$3.10" },
      { name: "Cherry", price: "$4.50" },
      { name: "Grape", price: "$2.70" },
      { name: "Mango", price: "$1.90" },
      { name: "Orange", price: "$1.10" },
      { name: "Raspberry", price: "$3.80" },
      { name: "Strawberry", price: "$2.90" },
      { name: "Watermelon", price: "$5.20" }
    ];

    var cartCount = 0;
    var rowsEl = document.getElementById("rows");
    var countEl = document.getElementById("count");
    var emptyEl = document.getElementById("empty");
    var cartEl = document.getElementById("cart");
    var searchEl = document.getElementById("search");

    function render() {
      rowsEl.innerHTML = "";
      FRUITS.forEach(function (fruit) {
        var row = document.createElement("tr");
        row.dataset.name = fruit.name.toLowerCase();

        var nameCell = document.createElement("td");
        nameCell.textContent = fruit.name;

        var priceCell = document.createElement("td");
        priceCell.textContent = fruit.price;

        var actionCell = document.createElement("td");
        var button = document.createElement("button");
        button.className = "add-btn";
        button.type = "button";
        button.textContent = "Add " + fruit.name;
        button.addEventListener("click", function () {
          cartCount += 1;
          cartEl.textContent = "Cart: " + cartCount;
          button.disabled = true;
          button.textContent = "Added " + fruit.name;
        });
        actionCell.appendChild(button);

        row.appendChild(nameCell);
        row.appendChild(priceCell);
        row.appendChild(actionCell);
        rowsEl.appendChild(row);
      });
    }

    function applyFilter() {
      var query = searchEl.value.trim().toLowerCase();
      var shown = 0;
      Array.prototype.forEach.call(rowsEl.children, function (row) {
        var match = row.dataset.name.indexOf(query) !== -1;
        row.classList.toggle("hidden", !match);
        if (match) shown += 1;
      });
      countEl.textContent = "Showing " + shown + " of " + FRUITS.length;
      emptyEl.classList.toggle("visible", shown === 0);
    }

    searchEl.addEventListener("input", applyFilter);
    document.getElementById("reset").addEventListener("click", function () {
      searchEl.value = "";
      applyFilter();
    });

    render();
    applyFilter();
  </script>
</body>
</html>
